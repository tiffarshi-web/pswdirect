    <!-- PWA manifest via Progressier (non-blocking) -->
    <link rel="manifest" href="https://progressier.app/xXf0UWVAPdw78va7cNFf/progressier.json"/>

    <!-- Register our own service worker (not Progressier's) -->
    <script>
      if('serviceWorker' in navigator){
        navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(e){
          console.warn('[SW] Registration failed:',e);
        });
      }
    </script>

    <!-- Progressier push notifications — async, non-blocking, no SW registration -->
    <script>
      (function(){
        // Tell Progressier NOT to register its own service worker
        window.progressierCustomServiceWorker = '/sw.js';
        var s=document.createElement('script');
        s.src='https://progressier.app/xXf0UWVAPdw78va7cNFf/script.js';
        s.async=true;
        s.onerror=function(){console.warn('[PWA] Progressier script failed — app continues normally')};
        document.head.appendChild(s);
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA failover: if JS bundle fails to load/render, show recovery UI -->
    <noscript>
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:2rem;text-align:center;background:#f8f9fa">
        <div style="max-width:380px">
          <h1 style="font-size:1.25rem;margin-bottom:.75rem;color:#111">App failed to load</h1>
          <p style="color:#666;margin-bottom:1.5rem;font-size:.9rem">JavaScript is disabled or the app bundle couldn't load. Please enable JavaScript and try again.</p>
        </div>
      </div>
    </noscript>

    <script>
      // Failover: if #root is still empty after 12s, show recovery screen
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.children.length === 0 && !root.innerHTML.trim()) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:2rem;text-align:center;background:#f8f9fa">' +
              '<div style="max-width:380px">' +
                '<div style="font-size:2.5rem;margin-bottom:1rem">⚠️</div>' +
                '<h1 style="font-size:1.25rem;margin-bottom:.5rem;color:#111">App failed to load</h1>' +
                '<p style="color:#666;margin-bottom:1.5rem;font-size:.875rem">This can happen after an update. Clearing cached data usually fixes it.</p>' +
                '<button onclick="' +
                  "localStorage.clear();sessionStorage.clear();" +
                  "if(window.caches){caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})})}" +
                  "if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})})}" +
                  "setTimeout(function(){location.reload()},300);" +
                '" style="background:#2563eb;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:.95rem;cursor:pointer;width:100%;margin-bottom:.75rem">Refresh App</button>' +
                '<a href="' + location.origin + location.pathname + '" target="_blank" rel="noopener" style="display:inline-block;color:#2563eb;font-size:.8rem;text-decoration:underline">Open in browser</a>' +
              '</div>' +
            '</div>';
        }
      }, 12000);
    </script>
