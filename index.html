    <!-- Google Analytics 4 -->

    <script>
      window.dataLayer=window.dataLayer||[];
      function gtag(){dataLayer.push(arguments);}
      gtag('js',new Date());
      gtag('config','G-J7TJJ4QTMP',{send_page_view:false});

    <!-- PWA manifest via Progressier (non-blocking) -->
    <link rel="manifest" href="https://progressier.app/xXf0UWVAPdw78va7cNFf/progressier.json"/>

    <!--
      NOTE: We intentionally do NOT unregister service workers on load anymore.
      Previously an "unregister-all + purge-all-caches" block ran here on every
      page load, which destroyed the Progressier push-notification subscription
      before it could be used. Legacy /sw.js registrations are cleaned up by
      the one-time kill-switch worker at public/sw.js (skill-compliant: only
      touches its own scope, unregisters itself, then Progressier's own SW
      takes over on the next visit).
    -->

    <!-- Progressier push notifications — async, non-blocking.
         We let Progressier register and manage its own service worker so push
         subscriptions persist. Do NOT set window.progressierCustomServiceWorker. -->
    <script>
      (function(){
        var s=document.createElement('script');
        s.src='https://progressier.app/xXf0UWVAPdw78va7cNFf/script.js';
        s.async=true;
        s.onerror=function(){console.warn('[PWA] Progressier script failed — app continues normally')};
        document.head.appendChild(s);
      })();
    </script>
    
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA failover: if JS bundle fails to load/render, show recovery UI -->
    <noscript>
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:2rem;text-align:center;background:#f8f9fa">
        <div style="max-width:380px">
          <h1 style="font-size:1.25rem;margin-bottom:.75rem;color:#111">App failed to load</h1>
          <p style="color:#666;margin-bottom:1.5rem;font-size:.9rem">JavaScript is disabled or the app bundle couldn't load. Please enable JavaScript and try again.</p>
        </div>
      </div>
    </noscript>

    <script>
      // Auto-failover: if #root is STILL empty after 12s, attempt recovery.
      // 12s (not 6s) avoids false positives on slow networks where React mounts
      // a moment after the timer would have fired, leaving users stuck on the
      // recovery screen even though the app actually loaded.
      setTimeout(function () {
        var root = document.getElementById("root");
        if (root && root.children.length === 0 && !root.innerHTML.trim()) {
          // Check if we already auto-recovered this session
          if (sessionStorage.getItem("psa_auto_recovered")) {
            // Already tried once — show manual button as last resort
            root.innerHTML =
              '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:2rem;text-align:center;background:#f8f9fa">' +
                '<div style="max-width:380px">' +
                  '<div style="font-size:2.5rem;margin-bottom:1rem">⚠️</div>' +
                  '<h1 style="font-size:1.25rem;margin-bottom:.5rem;color:#111">App failed to load</h1>' +
                  '<p style="color:#666;margin-bottom:1.5rem;font-size:.875rem">Please clear your browser data and try again.</p>' +
                  '<button onclick="localStorage.clear();sessionStorage.clear();location.reload()" style="background:#2563eb;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:.95rem;cursor:pointer;width:100%">Refresh App</button>' +
                '</div>' +
              '</div>';
            return;
          }
          // First attempt: auto-clear caches only (leave Progressier SW alone).
          console.warn("[Failover] Root empty after 12s — auto-clearing caches");
          sessionStorage.setItem("psa_auto_recovered", "true");
          localStorage.removeItem("psa_app_version");
          localStorage.removeItem("psa_build_ts");
          if(window.caches){ caches.keys().then(function(k){ k.forEach(function(n){ caches.delete(n) }) }) }
          setTimeout(function(){ location.reload(); }, 500);
        }
      }, 12000);
    </script>
  </body>
</html>
